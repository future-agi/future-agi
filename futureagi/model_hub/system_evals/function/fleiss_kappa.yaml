eval_id: 199
name: fleiss_kappa
description: "Computes Fleiss' Kappa for multi-rater agreement. Extends Cohen's Kappa to N raters. Input: matrix where rows=subjects, columns=categories, values=rater counts."
eval_tags:
- NLP Metrics
- Output Validation
visible_ui: true
permissions: {allow_edit: false, allow_copy: true}
output_type_normalized: percentage
pass_threshold: 0.5
config:
  required_keys: [output]
  output: score
  eval_type_id: CustomCodeEval
  config: {}
  config_params_desc: {output: "Rating matrix as JSON: [[count_cat1, count_cat2, ...], ...] where each row is a subject"}
  code: |
    def evaluate(input, output, expected, context, **kwargs):
        import json
        try:
            matrix = json.loads(str(kwargs.get("output", output))) if isinstance(kwargs.get("output", output), str) else kwargs.get("output", output)
        except: return {"score": 0.0, "reason": "Cannot parse matrix"}
        if not isinstance(matrix, list) or not matrix: return {"score": 0.0, "reason": "Invalid matrix"}
        n = len(matrix)
        k = len(matrix[0])
        N = sum(matrix[0])
        if n == 0 or k == 0 or N == 0: return {"score": 0.0, "reason": "Empty matrix"}
        pi = [sum(r*(r-1) for r in row)/(N*(N-1)) if N > 1 else 0 for row in matrix]
        P = sum(pi)/n
        pj = [sum(matrix[i][j] for i in range(n))/(n*N) for j in range(k)]
        Pe = sum(p**2 for p in pj)
        kappa = (P - Pe)/(1 - Pe) if Pe < 1 else (1.0 if P == 1 else 0.0)
        return {"score": float((kappa+1)/2), "reason": f"Fleiss Kappa: {kappa:.4f}"}
