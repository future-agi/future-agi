eval_id: 101
name: bleu_score
description: Computes a bleu score between the expected gold answer and the model output.
criteria: Check if the generated caption or description is similar to the reference caption or description. If the generated
  caption or description is not similar to the reference caption or description then return Failed else return Passed
eval_tags:
- NLP Metrics
- Text
visible_ui: true
permissions:
  allow_edit: false
  allow_copy: true
output_type_normalized: percentage
pass_threshold: 0.5
config:
  required_keys:
  - reference
  - hypothesis
  output: score
  eval_type_id: CustomCodeEval
  config: {}
  config_params_desc: {}
  code: |
    def evaluate(input, output, expected, context, **kwargs):
        # Pure-Python BLEU-4 with smoothing (no nltk required).
        import math
        from collections import Counter
        reference = kwargs.get("reference", expected or "")
        hypothesis = kwargs.get("hypothesis", output or "")
        if not reference or not hypothesis:
            return {"score": 0.0, "reason": "Missing reference or hypothesis"}
        ref_tokens = str(reference).split()
        hyp_tokens = str(hypothesis).split()
        if not hyp_tokens:
            return {"score": 0.0, "reason": "Empty hypothesis"}

        def _ngrams(tokens, n):
            return [tuple(tokens[i:i + n]) for i in range(len(tokens) - n + 1)]

        def _modified_precision(ref, hyp, n):
            ref_ngrams = Counter(_ngrams(ref, n))
            hyp_ngrams = Counter(_ngrams(hyp, n))
            if not hyp_ngrams:
                return 0.0, 0
            clipped = 0
            total = sum(hyp_ngrams.values())
            for ng, count in hyp_ngrams.items():
                clipped += min(count, ref_ngrams.get(ng, 0))
            return clipped, total

        # BLEU is only defined over the n-gram orders the hypothesis can
        # form. Scoring fixed 1..4 orders zeroed out short answers: a
        # single-word exact match scored ~2e-07 because orders 2-4 each
        # contributed log(1e-9). Restrict to the available orders with
        # renormalized weights, and smooth zero-overlap orders with a small
        # epsilon mass (NLTK method-1 style) instead of inflating them.
        max_n = min(4, len(hyp_tokens))
        weights = [1.0 / max_n] * max_n
        log_precisions = []
        for n in range(1, max_n + 1):
            clipped, total = _modified_precision(ref_tokens, hyp_tokens, n)
            if clipped > 0:
                precision = clipped / total
            else:
                precision = 0.1 / total  # epsilon smoothing, avoids log(0)
            log_precisions.append(math.log(precision))

        # Brevity penalty
        ref_len = len(ref_tokens)
        hyp_len = len(hyp_tokens)
        if hyp_len > ref_len:
            bp = 1.0
        elif hyp_len == 0:
            bp = 0.0
        else:
            bp = math.exp(1 - ref_len / hyp_len)

        score = bp * math.exp(sum(w * lp for w, lp in zip(weights, log_precisions)))
        score = max(0.0, min(1.0, score))
        return {"score": float(score), "reason": f"BLEU-4 score: {score:.4f} (bp={bp:.3f})"}
