eval_id: 140
name: meteor_score
description: Computes METEOR score between reference and hypothesis. Uses unigram matching with exact and stem matching, penalizing
  fragmentation. More correlated with human judgment than BLEU for many tasks.
criteria: Measures translation/generation quality using unigram precision and recall with stemming and fragmentation penalty.
eval_tags:
- NLP Metrics
- Text
visible_ui: true
permissions:
  allow_edit: false
  allow_copy: true
output_type_normalized: percentage
pass_threshold: 0.5
config:
  required_keys:
  - reference
  - hypothesis
  output: score
  eval_type_id: CustomCodeEval
  config: {}
  config_params_desc:
    reference: The reference/expected text
    hypothesis: The generated/output text
  code: |
    def evaluate(input, output, expected, context, **kwargs):
        from nltk.translate.meteor_score import meteor_score as _meteor
        reference = str(kwargs.get("reference", expected or "")).strip()
        hypothesis = str(kwargs.get("hypothesis", output or "")).strip()
        if not reference and not hypothesis:
            return {"score": 1.0, "reason": "METEOR: 1.0 (both empty)"}
        if not reference or not hypothesis:
            return {"score": 0.0, "reason": "Missing reference or hypothesis"}
        ref_tokens = reference.lower().split()
        hyp_tokens = hypothesis.lower().split()
        if not ref_tokens or not hyp_tokens:
            return {"score": 0.0, "reason": "Empty tokens after split"}
        try:
            score = _meteor([ref_tokens], hyp_tokens)
        except Exception as e:
            return {"score": 0.0, "reason": f"METEOR error: {e}"}
        return {"score": float(score), "reason": f"METEOR: {score:.4f}"}
