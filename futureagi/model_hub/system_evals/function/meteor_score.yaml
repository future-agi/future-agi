eval_id: 140
name: meteor_score
description: Computes METEOR score between reference and hypothesis. Uses unigram matching with exact and stem matching, penalizing
  fragmentation. More correlated with human judgment than BLEU for many tasks.
criteria: Measures translation/generation quality using unigram precision and recall with stemming and fragmentation penalty.
eval_tags:
- NLP Metrics
- Text
visible_ui: true
permissions:
  allow_edit: false
  allow_copy: true
output_type_normalized: percentage
pass_threshold: 0.5
config:
  required_keys:
  - reference
  - hypothesis
  output: score
  eval_type_id: CustomCodeEval
  config: {}
  config_params_desc:
    reference: The reference/expected text
    hypothesis: The generated/output text
  code: |
    def evaluate(input, output, expected, context, **kwargs):
        import re
        reference = kwargs.get("reference", expected or "")
        hypothesis = kwargs.get("hypothesis", output or "")
        if not reference or not hypothesis:
            return {"score": 0.0, "reason": "Missing reference or hypothesis"}
        def _stem(word):
            for sfx in ["ingly", "edly", "tion", "sion", "ment", "ness", "able", "ible",
                         "ing", "ous", "ful", "ive", "ize", "ise", "ent", "ant",
                         "ly", "ed", "er", "es", "al", "en", "s"]:
                if len(word) > len(sfx) + 2 and word.endswith(sfx):
                    return word[:-len(sfx)]
            return word
        ref_tokens = str(reference).lower().split()
        hyp_tokens = str(hypothesis).lower().split()
        if not ref_tokens or not hyp_tokens:
            return {"score": 0.0, "reason": "Empty tokens"}
        ref_matched = [False] * len(ref_tokens)
        hyp_matched = [False] * len(hyp_tokens)
        for i, ht in enumerate(hyp_tokens):
            for j, rt in enumerate(ref_tokens):
                if not ref_matched[j] and ht == rt:
                    hyp_matched[i] = True
                    ref_matched[j] = True
                    break
        ref_stems = [_stem(t) for t in ref_tokens]
        hyp_stems = [_stem(t) for t in hyp_tokens]
        for i, hs in enumerate(hyp_stems):
            if hyp_matched[i]:
                continue
            for j, rs in enumerate(ref_stems):
                if not ref_matched[j] and hs == rs:
                    hyp_matched[i] = True
                    ref_matched[j] = True
                    break
        matches = sum(hyp_matched)
        if matches == 0:
            return {"score": 0.0, "reason": "METEOR: 0.0 (no matches)"}
        precision = matches / len(hyp_tokens)
        recall = matches / len(ref_tokens)
        f_mean = (precision * recall) / (0.9 * precision + 0.1 * recall)
        chunks = 0
        prev = False
        for m in hyp_matched:
            if m and not prev:
                chunks += 1
            prev = m
        penalty = 0.5 * (chunks / matches) ** 3
        score = max(0.0, min(1.0, f_mean * (1 - penalty)))
        return {"score": float(score), "reason": f"METEOR: {score:.4f} (P={precision:.3f}, R={recall:.3f}, chunks={chunks})"}
