# Test infrastructure services
# Usage: docker compose -f docker-compose.test.yml -p futureagi-test up -d
#
# Test ports are in 15xxx-19xxx range to avoid collision with development ports

services:
  test-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: test_tfc
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d test_tfc"]
      interval: 5s
      timeout: 3s
      retries: 5

  test-redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  test-clickhouse:
    # 25.3-alpine matches the production CH 25.3 path. Bumped 2026-05-27
    # during CH25 migration close-out so tests exercise the typed-JSON
    # schema (013): `metadata` / `resource_attrs` / `attributes_extra` as
    # JSON columns + the `is_deleted` UInt8 column. Django migration
    # 0078_ch25_apply_schema applies the schema on first boot.
    image: clickhouse/clickhouse-server:25.3-alpine
    environment:
      # CH 25.3 entrypoint refuses to start the default user without a
      # password unless this is set; tests use CH_PASSWORD="" so we mirror
      # that here.
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
      CLICKHOUSE_SKIP_USER_SETUP: "1"
      CLICKHOUSE_DB: "test_tfc"
    volumes:
      # Provides macros (shard=01, replica=test-01) and an embedded
      # clickhouse-keeper so the legacy ReplicatedReplacingMergeTree tables
      # (model_hub.apps._ensure_analytics_schema → tracer/services/clickhouse/schema.py)
      # can register paths without an external ZK ensemble.
      - ./.ci/clickhouse-test-config.xml:/etc/clickhouse-server/config.d/test-overrides.xml:ro
      # The v2 spans table declares `SETTINGS storage_policy = 'tiered'`.
      # Defines the 'tiered' policy with a local cold volume.
      - ./.ci/clickhouse-storage-policy.xml:/etc/clickhouse-server/config.d/001_storage_policy.xml:ro
    ports:
      - "18123:8123"
      - "19000:9000"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:8123/ping",
        ]
      interval: 5s
      timeout: 3s
      retries: 5

  test-minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "19005:9000"
      - "19006:9001"
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5

networks:
  default:
    name: futureagi-test-network
