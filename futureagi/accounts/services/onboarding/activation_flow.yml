schema_version: activation-flow-2026-05-27.v1

product_loop_steps:
  build:
    label: Build
    description: Create or connect the AI surface.
  test:
    label: Test
    description: Run a focused check before shipping.
  observe:
    label: Observe
    description: Inspect real quality signals.
  ship:
    label: Ship
    description: Move the workflow toward production.
  improve:
    label: Improve
    description: Turn signal into a repeatable guardrail.

goals:
  monitor_production_ai_app:
    primary_path: observe
    label: Monitor a production AI app
    description: Connect traces and review the first quality signal.
    estimated_minutes: 5
  improve_prompts:
    primary_path: prompt
    label: Test and improve prompts
    description: Create a prompt test loop and compare output changes.
    estimated_minutes: 6
  build_ai_agent:
    primary_path: agent
    label: Build or prototype an AI agent
    description: Run a first scenario and inspect the agent trace.
    estimated_minutes: 8
  control_model_traffic:
    primary_path: gateway
    label: Route LLM traffic safely
    description: Send a gateway request and review the first log.
    estimated_minutes: 7
  evaluate_quality:
    primary_path: evals
    label: Evaluate quality on data or traces
    description: Create a small eval and review the first failure.
    estimated_minutes: 7
  connect_voice_ai_agent:
    primary_path: voice
    label: Connect a voice AI agent
    description: Run or review a call with clear success criteria.
    estimated_minutes: 8
  explore_sample_data:
    primary_path: sample
    label: Explore with sample data
    description: Review sample signals while real data is pending.
    estimated_minutes: 2

goal_aliases:
  test_and_improve_prompts: improve_prompts
  build_or_prototype_agent: build_ai_agent
  route_llm_traffic_safely: control_model_traffic
  evaluate_quality_on_data_or_traces: evaluate_quality

paths:
  prompt:
    label: Improve prompts
    description: Test and compare prompt versions.
    first_action_id: create_prompt
    requires_permission: prompt:write
  agent:
    label: Build an AI agent
    description: Create an agent and review its first scenario.
    first_action_id: create_agent
    requires_permission: agent:write
  observe:
    label: Monitor a production AI app
    description: Connect traces and inspect quality signals.
    first_action_id: create_observe_project
    requires_permission: observe:write
  gateway:
    label: Control model traffic
    description: Configure model routing and production policies.
    first_action_id: gateway_add_provider
    requires_permission: gateway:write
  voice:
    label: Connect a voice AI agent
    description: Review calls and success criteria.
    first_action_id: create_voice_agent
    requires_permission: voice:write
  evals:
    label: Evaluate quality
    description: Create datasets, scorers, and failure review loops.
    first_action_id: create_eval_dataset
    requires_permission: evals:write
  dashboards:
    label: Build quality dashboards
    description: Track quality, cost, latency, and failures.
    first_action_id:
    requires_permission: dashboards:write
  sample:
    label: Explore with sample data
    description: Use a sample workspace while real data is pending.
    first_action_id: open_sample_trace
    requires_permission:

path_aliases:
  prompts: prompt
  workbench: prompt
  agents: agent
  simulate_agent: agent
  observability: observe
  traces: observe
  model_gateway: gateway
  voice_ai: voice
  eval: evals
  evaluations: evals
  dashboard: dashboards
  sample_project: sample

action_kinds:
  - choose_goal
  - setup
  - send_signal
  - review
  - improve
  - sample_project
  - request_access
  - fallback
  - daily_quality
  - adjacent_loop

actions:
  open_get_started:
    kind: fallback
    title: Open Get Started
    description: Use the existing setup checklist.
    route_key: get_started
    cta_label: Open Get Started
    priority: 10
    fallback_route_key: get_started
    source: fallback
  open_workspace_list:
    kind: fallback
    title: Choose a workspace
    description: Open workspace settings to choose or create a workspace.
    route_key: workspace_list
    cta_label: Open workspaces
    priority: 100
    fallback_route_key: get_started
    source: workspace_missing
  request_workspace_access:
    kind: request_access
    title: Request workspace access
    description: Ask an admin for access before making onboarding changes.
    route_key: workspace_list
    cta_label: Request access
    priority: 90
    fallback_route_key: get_started
    source: permission_limited
  choose_onboarding_goal:
    kind: choose_goal
    title: Choose your first goal
    description: Pick the job you want FutureAGI to help with first.
    route_key: choose_goal
    cta_label: Choose goal
    priority: 100
    fallback_route_key: get_started
    target_path:
  create_prompt:
    kind: setup
    title: Create a prompt
    description: Create one prompt before running a focused test.
    route_key: prompt_create
    cta_label: Create prompt
    priority: 100
    estimated_minutes: 2
    requires_permission: prompt:write
    completion_event: prompt_created
    target_path: prompt
    fallback_route_key: prompt_workbench
  run_prompt_test:
    kind: send_signal
    title: Run prompt test
    description: Run the prompt on one example before saving a baseline.
    route_key: prompt_run_test
    cta_label: Run test
    priority: 100
    estimated_minutes: 2
    requires_permission: prompt:write
    completion_event: prompt_test_run_completed
    target_path: prompt
    fallback_route_key: prompt_workbench
  save_prompt_version:
    kind: improve
    title: Save baseline version
    description: Save a baseline so later edits can be compared.
    route_key: prompt_save_version
    cta_label: Save baseline
    priority: 100
    estimated_minutes: 2
    requires_permission: prompt:write
    completion_event: prompt_version_created
    target_path: prompt
    fallback_route_key: prompt_workbench
  compare_prompt_versions:
    kind: review
    title: Compare prompt versions
    description: Compare the baseline against an edit on the same example.
    route_key: prompt_compare_versions
    cta_label: Compare versions
    priority: 100
    estimated_minutes: 3
    requires_permission: prompt:write
    completion_event: prompt_comparison_completed
    target_path: prompt
    fallback_route_key: prompt_workbench
  add_prompt_failure_example:
    kind: adjacent_loop
    title: Add a failing example
    description: Turn the comparison into a reusable example or evaluator.
    route_key: prompt_add_failure
    cta_label: Add example
    priority: 90
    estimated_minutes: 4
    requires_permission: prompt:write
    completion_event: dataset_example_added
    target_path: prompt
    fallback_route_key: prompt_workbench
  open_prompt_metrics:
    kind: review
    title: Open prompt metrics
    description: Review prompt quality signals and continue improving.
    route_key: prompt_metrics
    cta_label: Open prompt metrics
    priority: 80
    target_path: prompt
    fallback_route_key: prompt_workbench
  open_prompt_workbench:
    kind: fallback
    title: Open prompt workbench
    description: Open the prompt workbench.
    route_key: prompt_workbench
    cta_label: Open workbench
    priority: 20
    target_path: prompt
    fallback_route_key: get_started
  create_agent:
    kind: setup
    title: Create an agent
    description: Create one agent before running a first scenario.
    route_key: agent_create
    cta_label: Create agent
    priority: 100
    estimated_minutes: 3
    requires_permission: agent:write
    completion_event: agent_created
    target_path: agent
    fallback_route_key: agent_list
  run_agent_scenario:
    kind: send_signal
    title: Run one scenario
    description: Run the agent once before reviewing the execution.
    route_key: agent_run_scenario
    cta_label: Run scenario
    priority: 100
    estimated_minutes: 4
    requires_permission: agent:write
    completion_event: agent_prototype_run_completed
    target_path: agent
    fallback_route_key: agent_list
  review_agent_trace:
    kind: review
    title: Review what happened
    description: Inspect the agent run and identify the first useful signal.
    route_key: agent_review_trace
    cta_label: Review run
    priority: 100
    estimated_minutes: 3
    completion_event: agent_trace_reviewed
    target_path: agent
    fallback_route_key: agent_list
  save_agent_eval:
    kind: improve
    title: Save this as coverage
    description: Turn the reviewed run into repeatable eval coverage.
    route_key: agent_save_eval
    cta_label: Save as eval
    priority: 100
    estimated_minutes: 4
    requires_permission: agent:write
    completion_event: agent_scenario_saved_as_eval
    target_path: agent
    fallback_route_key: agent_list
  create_agent_eval:
    kind: improve
    title: Create eval coverage
    description: Add an eval that keeps the agent behavior measurable.
    route_key: agent_create_eval
    cta_label: Create eval
    priority: 95
    estimated_minutes: 4
    requires_permission: agent:write
    completion_event: agent_eval_created
    target_path: agent
    fallback_route_key: agent_list
  open_agent_quality:
    kind: review
    title: Open agent quality
    description: Review agent executions and continue improving coverage.
    route_key: agent_quality
    cta_label: Open agent quality
    priority: 80
    target_path: agent
    fallback_route_key: agent_list
  open_agent_playground:
    kind: fallback
    title: Open agents
    description: Open the agent workspace.
    route_key: agent_list
    cta_label: Open agents
    priority: 20
    target_path: agent
    fallback_route_key: get_started
  gateway_add_provider:
    kind: setup
    title: Add gateway provider
    description: Add one provider before sending model traffic through the gateway.
    route_key: gateway_provider
    cta_label: Add provider
    priority: 100
    estimated_minutes: 3
    requires_permission: gateway:write
    completion_event: gateway_provider_added
    target_path: gateway
    fallback_route_key: gateway_overview
  gateway_create_key:
    kind: setup
    title: Create gateway key
    description: Create one key for the first routed request.
    route_key: gateway_key
    cta_label: Create key
    priority: 100
    estimated_minutes: 2
    requires_permission: gateway:write
    completion_event: gateway_key_created
    target_path: gateway
    fallback_route_key: gateway_overview
  gateway_send_first_request:
    kind: send_signal
    title: Send first gateway request
    description: Send one request so the gateway loop has a real request to inspect.
    route_key: gateway_request
    cta_label: Send request
    priority: 100
    estimated_minutes: 4
    requires_permission: gateway:write
    completion_event: gateway_request_seen
    target_path: gateway
    fallback_route_key: gateway_overview
  gateway_review_request:
    kind: review
    title: Review gateway request
    description: Inspect the first request log for status, latency, and routing context.
    route_key: gateway_log_review
    cta_label: Review log
    priority: 100
    estimated_minutes: 3
    completion_event: gateway_log_opened
    target_path: gateway
    fallback_route_key: gateway_overview
  gateway_fix_failed_request:
    kind: review
    title: Review gateway failure
    description: Inspect the failed request and choose the first repair path.
    route_key: gateway_failure
    cta_label: Review failure
    priority: 100
    estimated_minutes: 4
    completion_event: gateway_failure_resolved
    target_path: gateway
    fallback_route_key: gateway_log_review
  gateway_add_policy:
    kind: improve
    title: Add gateway control
    description: Add a guardrail, fallback, or budget control for the first request path.
    route_key: gateway_policy
    cta_label: Add control
    priority: 100
    estimated_minutes: 4
    requires_permission: gateway:write
    completion_event: gateway_policy_created
    target_path: gateway
    fallback_route_key: gateway_overview
  open_gateway_logs:
    kind: review
    title: Open gateway logs
    description: Review the gateway request history.
    route_key: gateway_log_review
    cta_label: Open logs
    priority: 80
    target_path: gateway
    fallback_route_key: gateway_overview
  open_gateway_overview:
    kind: fallback
    title: Open gateway
    description: Open the model gateway workspace.
    route_key: gateway_overview
    cta_label: Open gateway
    priority: 20
    target_path: gateway
    fallback_route_key: get_started
  create_eval_dataset:
    kind: setup
    title: Create eval source
    description: Add the first dataset or trace source for the eval loop.
    route_key: eval_create_data
    cta_label: Add source
    priority: 100
    estimated_minutes: 3
    requires_permission: evals:write
    completion_event: eval_dataset_created
    target_path: evals
    fallback_route_key: eval_list
  add_eval_scorer:
    kind: improve
    title: Add eval scorer
    description: Add the metric that decides whether the output is good.
    route_key: eval_add_scorer
    cta_label: Add scorer
    priority: 100
    estimated_minutes: 3
    requires_permission: evals:write
    completion_event: eval_scorer_created
    target_path: evals
    fallback_route_key: eval_list
  run_eval:
    kind: send_signal
    title: Run eval
    description: Run the eval once before reviewing the result.
    route_key: eval_run_first
    cta_label: Run eval
    priority: 100
    estimated_minutes: 3
    requires_permission: evals:write
    completion_event: eval_run_completed
    target_path: evals
    fallback_route_key: eval_list
  review_eval_failures:
    kind: review
    title: Review eval result
    description: Inspect failures or summary before moving the loop forward.
    route_key: eval_review_failures
    cta_label: Review result
    priority: 100
    estimated_minutes: 4
    completion_event: eval_failures_reviewed
    target_path: evals
    fallback_route_key: eval_list
  fix_eval_source:
    kind: adjacent_loop
    title: Fix the source
    description: Use the failure review to update the source or expected behavior.
    route_key: eval_next_loop
    cta_label: Fix source
    priority: 95
    estimated_minutes: 5
    requires_permission: evals:write
    completion_event: eval_failure_action_created
    target_path: evals
    fallback_route_key: eval_review_failures
  open_eval_usage:
    kind: review
    title: Open eval results
    description: Review eval usage, failures, and quality trends.
    route_key: eval_review_failures
    cta_label: Open results
    priority: 80
    target_path: evals
    fallback_route_key: eval_list
  open_evals:
    kind: fallback
    title: Open evaluations
    description: Open the evaluations workspace.
    route_key: eval_list
    cta_label: Open evaluations
    priority: 20
    target_path: evals
    fallback_route_key: get_started
  create_voice_agent:
    kind: setup
    title: Create voice agent
    description: Create or connect one voice agent before the first test call.
    route_key: voice_create_agent
    cta_label: Create agent
    priority: 100
    estimated_minutes: 3
    requires_permission: voice:write
    completion_event: voice_agent_created
    target_path: voice
    fallback_route_key: voice_list
  run_voice_test_call:
    kind: send_signal
    title: Run test call
    description: Run one safe call or simulation before reviewing the result.
    route_key: voice_run_test_call
    cta_label: Run call
    priority: 100
    estimated_minutes: 4
    requires_permission: voice:write
    completion_event: voice_test_call_completed
    target_path: voice
    fallback_route_key: voice_list
  review_voice_call:
    kind: review
    title: Review voice call
    description: Review transcript, audio, latency, and interruption signals.
    route_key: voice_review_call
    cta_label: Review call
    priority: 100
    estimated_minutes: 4
    completion_event: voice_call_reviewed
    target_path: voice
    fallback_route_key: voice_list
  add_voice_success_criteria:
    kind: improve
    title: Add success criteria
    description: Add criteria so future voice calls can be judged.
    route_key: voice_add_success_criteria
    cta_label: Add criteria
    priority: 100
    estimated_minutes: 4
    requires_permission: voice:write
    completion_event: voice_success_criteria_added
    target_path: voice
    fallback_route_key: voice_review_call
  voice_monitor_calls:
    kind: review
    title: Monitor voice calls
    description: Review voice call quality against the saved criteria.
    route_key: voice_monitor_calls
    cta_label: Monitor calls
    priority: 80
    target_path: voice
    fallback_route_key: voice_list
  open_voice_agents:
    kind: fallback
    title: Open voice agents
    description: Open the voice agent workspace.
    route_key: voice_list
    cta_label: Open agents
    priority: 20
    target_path: voice
    fallback_route_key: get_started
  create_observe_project:
    kind: setup
    title: Connect observability
    description: Create an observability project and send one request.
    route_key: observe_setup
    cta_label: Connect observability
    priority: 100
    estimated_minutes: 5
    requires_permission: observe:write
    completion_event: observe_project_created
    target_path: observe
    fallback_route_key: get_started
  send_first_trace:
    kind: send_signal
    title: Send your first trace
    description: Send one production or test trace to unlock review.
    route_key: observe_project
    cta_label: Send trace
    priority: 100
    estimated_minutes: 5
    requires_permission: observe:write
    completion_event: trace_received
    target_path: observe
    fallback_route_key: get_started
  review_first_trace:
    kind: review
    title: Review the first trace
    description: Inspect latency, cost, and quality signal context.
    route_key: observe_trace_detail
    cta_label: Review trace
    priority: 100
    estimated_minutes: 3
    completion_event: trace_reviewed
    target_path: observe
    fallback_route_key: get_started
  create_trace_evaluator:
    kind: improve
    title: Create an evaluator
    description: Turn the reviewed trace into a repeatable quality check.
    route_key: observe_project
    cta_label: Create evaluator
    priority: 100
    estimated_minutes: 5
    requires_permission: observe:write
    completion_event: first_quality_loop_completed
    target_path: observe
    fallback_route_key: get_started
  open_observe_dashboard:
    kind: review
    title: Open observe dashboard
    description: Review the current quality loop.
    route_key: observe_dashboard
    cta_label: Open observe
    priority: 80
    target_path: observe
    fallback_route_key: get_started
  open_observe_dashboard_fallback:
    kind: review
    title: Open observe dashboard
    description: Review current observability signals.
    route_key: observe_dashboard
    cta_label: Open observe
    priority: 20
    target_path: observe
    fallback_route_key: get_started
  review_daily_quality:
    kind: daily_quality
    title: Review today's quality signal
    description: Open the daily quality view and resolve the top item.
    route_key: daily_quality_home
    cta_label: Review signal
    priority: 100
    estimated_minutes: 4
    completion_event: daily_quality_item_reviewed
    target_path: observe
    fallback_route_key: get_started
  open_sample_trace:
    kind: sample_project
    title: Open sample trace
    description: Review a sample trace while real data is pending.
    route_key: sample_trace
    cta_label: Open sample trace
    priority: 30
    estimated_minutes: 2
    completion_event: sample_signal_viewed
    is_sample: true
    target_path: sample
    fallback_route_key: get_started
  choose_available_path:
    kind: fallback
    title: Choose an available path
    description: Start with the observe path while this path is unavailable.
    route_key: observe_setup
    cta_label: Start with observe
    priority: 80
    requires_permission: observe:write
    target_path: observe
    fallback_route_key: get_started

stage_defaults:
  home_mode: first_run
  copy:
    eyebrow: Setup
    title: Open Get Started
    description: The existing setup checklist is available.
  progress:
    build: selected
    test: available
    observe: available
    ship: available
    improve: available
  recommended_action: choose_available_path
  fallback_action: open_get_started
  next: []

stages:
  feature_disabled:
    home_mode: fallback
    copy:
      eyebrow: Setup
      title: Start with the setup checklist
      description: The existing checklist is available for this workspace.
    progress:
      build: not_started
      test: available
      observe: not_started
      ship: available
      improve: available
    recommended_action: open_get_started
    fallback_action: open_get_started
    next: []
  workspace_missing:
    home_mode: fallback
    copy:
      eyebrow: Workspace
      title: Choose a workspace
      description: Select a workspace before starting a product loop.
    progress:
      build: not_started
      test: available
      observe: not_started
      ship: available
      improve: available
    recommended_action: open_workspace_list
    fallback_action: open_get_started
    next:
      - choose_goal
  permission_limited:
    home_mode: fallback
    copy:
      eyebrow: Access
      title: Request access for setup
      description: This workspace needs write access before setup can continue.
    recommended_action: request_workspace_access
    fallback_action: open_get_started
    requires_write: false
    next:
      - connect_observability
  choose_goal:
    home_mode: first_run
    copy:
      eyebrow: First goal
      title: Choose what to set up first
      description: Pick the first product job before moving into setup.
    progress:
      build: not_started
      test: available
      observe: not_started
      ship: available
      improve: available
    recommended_action: choose_onboarding_goal
    fallback_action: open_get_started
    requires_write: true
    next:
      - connect_observability
      - selected_path_unavailable
  selected_path_unavailable:
    home_mode: fallback
    copy:
      eyebrow: Path unavailable
      title: Start with an available path
      description: This selected path is not available in the product yet.
    recommended_action: choose_available_path
    fallback_action: open_get_started
    next:
      - connect_observability
  activated:
    home_mode: first_run
    copy:
      eyebrow: Activated
      title: First quality loop is ready
      description: The workspace has completed a first meaningful loop.
    progress:
      build: complete
      test: available
      observe: complete
      ship: available
      improve: complete
    recommended_action: open_observe_dashboard
    fallback_action: open_observe_dashboard_fallback
    next:
      - daily_review
  daily_review:
    home_mode: daily_quality
    copy:
      eyebrow: Daily quality
      title: Review today's quality signal
      description: Open the latest quality signal and keep the loop fresh.
    progress:
      build: complete
      test: available
      observe: complete
      ship: available
      improve: complete
    recommended_action: review_daily_quality
    fallback_action: open_observe_dashboard_fallback
    next: []
  connect_observability:
    home_mode: first_run
    copy:
      eyebrow: Observe
      title: Connect observability
      description: Create an observe project and send one trace.
    progress:
      build: selected
      test: available
      observe: not_started
      ship: available
      improve: available
    recommended_action: create_observe_project
    fallback_action: open_get_started
    flagged_fallback_actions:
      onboarding_sample_project: open_sample_trace
    requires_write: true
    next:
      - waiting_for_first_trace
      - waiting_for_first_trace_sample_available
  waiting_for_first_trace:
    home_mode: first_run
    copy:
      eyebrow: Waiting
      title: Waiting for the first trace
      description: Once a trace lands, the next review action will unlock.
    progress:
      build: selected
      test: available
      observe: in_progress
      ship: available
      improve: available
    recommended_action: send_first_trace
    fallback_action: open_get_started
    flagged_fallback_actions:
      onboarding_sample_project: open_sample_trace
    requires_write: true
    next:
      - review_first_trace
  waiting_for_first_trace_sample_available:
    home_mode: first_run
    copy:
      eyebrow: Waiting
      title: Waiting for real data
      description: Use a sample signal while the first real trace is pending.
    progress:
      build: selected
      test: available
      observe: in_progress
      ship: available
      improve: available
    recommended_action: send_first_trace
    fallback_action: open_sample_trace
    requires_write: true
    next:
      - review_first_trace
  review_first_trace:
    home_mode: first_run
    copy:
      eyebrow: First signal
      title: Review the first trace
      description: Inspect the first trace and capture the first quality signal.
    progress:
      build: selected
      test: available
      observe: in_progress
      ship: available
      improve: available
    recommended_action: review_first_trace
    fallback_action: open_get_started
    next:
      - create_trace_evaluator
  create_trace_evaluator:
    home_mode: first_run
    copy:
      eyebrow: Quality loop
      title: Create an evaluator
      description: Turn the reviewed trace into a repeatable quality check.
    progress:
      build: selected
      test: available
      observe: complete
      ship: available
      improve: in_progress
    recommended_action: create_trace_evaluator
    fallback_action: open_get_started
    requires_write: true
    next:
      - activated
  review_sample_signal:
    home_mode: first_run
    copy:
      eyebrow: Sample data
      title: Review a sample signal
      description: Inspect the sample signal while real workspace data is pending.
    recommended_action: open_sample_trace
