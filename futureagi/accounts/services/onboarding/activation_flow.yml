stage_rules:
  - stage: feature_disabled
    when:
      flag_disabled: onboarding_activation_state_api
  - stage: workspace_missing
    when:
      missing_any:
        - organization
        - workspace
  - stage: choose_goal
    when:
      missing: selected_goal
  - stage: selected_path_unavailable
    when:
      all:
        - context_not_equals:
            primary_path: observe
        - not:
            any:
              - all:
                  - context_equals:
                      primary_path: prompt
                  - flag_enabled: onboarding_prompt_path
              - all:
                  - context_equals:
                      primary_path: agent
                  - flag_enabled: onboarding_agent_path
              - all:
                  - context_equals:
                      primary_path: gateway
                  - flag_enabled: onboarding_gateway_path
              - all:
                  - context_equals:
                      primary_path: evals
                  - flag_enabled: onboarding_eval_path
              - all:
                  - context_equals:
                      primary_path: voice
                  - flag_enabled: onboarding_voice_path
  - stage: daily_review
    when:
      all:
        - context_equals:
            primary_path: observe
        - signal: first_loop_completed
        - flag_enabled: onboarding_daily_quality_home
        - signal: useful_daily_signal
  - stage: activated
    when:
      all:
        - context_equals:
            primary_path: observe
        - signal: first_loop_completed
  - stage: daily_review
    when:
      all:
        - context_equals:
            primary_path: prompt
        - signal: prompt_first_loop_completed
        - flag_enabled: onboarding_daily_quality_home
  - stage: activated
    when:
      all:
        - context_equals:
            primary_path: prompt
        - signal: prompt_first_loop_completed
  - stage: prompt_next_loop
    when:
      all:
        - context_equals:
            primary_path: prompt
        - signal: prompt_comparison_completed
        - signal_not: prompt_next_loop_action_exists
  - stage: compare_prompt_versions
    when:
      all:
        - context_equals:
            primary_path: prompt
        - signal: prompt_committed_version_exists
        - signal_not: prompt_comparison_completed
  - stage: save_prompt_version
    when:
      all:
        - context_equals:
            primary_path: prompt
        - signal: prompt_run_exists
        - signal_not: prompt_committed_version_exists
  - stage: run_prompt_test
    when:
      all:
        - context_equals:
            primary_path: prompt
        - signal: latest_prompt_id
        - signal_not: prompt_run_exists
  - stage: start_prompt
    when:
      context_equals:
        primary_path: prompt
  - stage: daily_review
    when:
      all:
        - context_equals:
            primary_path: agent
        - signal: agent_first_loop_completed
        - flag_enabled: onboarding_daily_quality_home
  - stage: activated
    when:
      all:
        - context_equals:
            primary_path: agent
        - signal: agent_first_loop_completed
  - stage: agent_create_eval
    when:
      all:
        - context_equals:
            primary_path: agent
        - signal: agent_has_review
        - signal_not: agent_has_eval_coverage
        - signal: agent_multiple_scenarios
  - stage: save_agent_eval
    when:
      all:
        - context_equals:
            primary_path: agent
        - signal: agent_has_review
        - signal_not: agent_has_eval_coverage
  - stage: review_agent_trace
    when:
      all:
        - context_equals:
            primary_path: agent
        - signal: agent_has_run
        - signal_not: agent_has_review
  - stage: run_agent_scenario
    when:
      all:
        - context_equals:
            primary_path: agent
        - signal: agent_has_agent
        - signal_not: agent_has_run
  - stage: create_agent
    when:
      context_equals:
        primary_path: agent
  - stage: daily_review
    when:
      all:
        - context_equals:
            primary_path: gateway
        - signal: gateway_first_loop_completed
        - flag_enabled: onboarding_daily_quality_home
  - stage: activated
    when:
      all:
        - context_equals:
            primary_path: gateway
        - signal: gateway_first_loop_completed
  - stage: fix_gateway_failure
    when:
      all:
        - context_equals:
            primary_path: gateway
        - signal: gateway_has_request
        - signal: gateway_request_is_error
        - signal_not: gateway_has_review
  - stage: fix_gateway_failure
    when:
      all:
        - context_equals:
            primary_path: gateway
        - signal: gateway_request_is_error
        - signal_not: gateway_has_failure_repair
        - signal_not: gateway_has_policy
  - stage: add_gateway_policy
    when:
      all:
        - context_equals:
            primary_path: gateway
        - signal: gateway_has_review
        - signal_not: gateway_has_policy
  - stage: review_gateway_log
    when:
      all:
        - context_equals:
            primary_path: gateway
        - signal: gateway_has_request
        - signal_not: gateway_has_review
  - stage: run_gateway_request
    when:
      all:
        - context_equals:
            primary_path: gateway
        - signal: gateway_has_key
        - signal_not: gateway_has_request
  - stage: create_gateway_key
    when:
      all:
        - context_equals:
            primary_path: gateway
        - signal: gateway_has_provider
        - signal_not: gateway_has_key
  - stage: configure_gateway_provider
    when:
      context_equals:
        primary_path: gateway
  - stage: daily_review
    when:
      all:
        - context_equals:
            primary_path: evals
        - signal: eval_first_loop_completed
        - flag_enabled: onboarding_daily_quality_home
  - stage: activated
    when:
      all:
        - context_equals:
            primary_path: evals
        - signal: eval_first_loop_completed
  - stage: review_eval_failures
    when:
      all:
        - context_equals:
            primary_path: evals
        - signal: eval_has_completed_run
        - signal_not: eval_has_review
  - stage: run_eval
    when:
      all:
        - context_equals:
            primary_path: evals
        - signal: eval_has_scorer
        - signal_not: eval_has_completed_run
  - stage: add_eval_scorer
    when:
      all:
        - context_equals:
            primary_path: evals
        - signal: eval_has_source
        - signal_not: eval_has_scorer
  - stage: create_eval_dataset
    when:
      context_equals:
        primary_path: evals
  - stage: daily_review
    when:
      all:
        - context_equals:
            primary_path: voice
        - signal: voice_first_loop_completed
        - flag_enabled: onboarding_daily_quality_home
  - stage: activated
    when:
      all:
        - context_equals:
            primary_path: voice
        - signal: voice_first_loop_completed
  - stage: run_voice_test_call
    when:
      all:
        - context_equals:
            primary_path: voice
        - signal: voice_call_failed
        - signal: voice_has_review
        - signal: voice_has_success_criteria
  - stage: add_voice_success_criteria
    when:
      all:
        - context_equals:
            primary_path: voice
        - signal: voice_has_review
        - signal_not: voice_has_success_criteria
  - stage: review_voice_call
    when:
      all:
        - context_equals:
            primary_path: voice
        - signal: voice_has_call
        - signal_not: voice_has_review
  - stage: run_voice_test_call
    when:
      all:
        - context_equals:
            primary_path: voice
        - signal: voice_has_agent
        - signal_not: voice_has_completed_call
  - stage: create_voice_agent
    when:
      context_equals:
        primary_path: voice
  - stage: connect_observability
    when:
      signal_not: observe_project_exists
  - stage: waiting_for_first_trace_sample_available
    when:
      all:
        - signal: observe_project_exists
        - signal_not: trace_exists
        - flag_enabled: onboarding_sample_project
  - stage: waiting_for_first_trace
    when:
      all:
        - signal: observe_project_exists
        - signal_not: trace_exists
  - stage: review_first_trace
    when:
      all:
        - signal: trace_exists
        - signal_not: trace_reviewed
  - stage: create_trace_evaluator
    when:
      all:
        - signal: trace_reviewed
        - not:
            any:
              - signal: evaluator_exists
              - signal: dashboard_exists
              - signal: alert_exists
              - signal: saved_view_exists
  - stage: activated
    when:
      always: true

