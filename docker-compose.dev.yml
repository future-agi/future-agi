
x-dev-worker: &dev-worker
  image: futureagi/future-agi:dev
  working_dir: /app/backend
  pull_policy: never
  volumes:
    - ./futureagi:/app/backend
  environment:
    FAST_STARTUP: "true"

services:
  frontend:
    build:
      context: ./frontend
      target: dev
    image: futureagi/frontend:dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports: !override
      - "${FRONTEND_PORT:-3000}:3000"
    environment:

      VITE_USE_POLLING: "true"
      VITE_HOST_API: ${VITE_HOST_API:-http://localhost:8000}
      VITE_ENVIRONMENT: ${VITE_ENVIRONMENT:-development}
      VITE_GOOGLE_SITE_KEY: ${VITE_GOOGLE_SITE_KEY:-}

  backend:
    build:
      context: .
      dockerfile: Dockerfile.oss
    image: futureagi/future-agi:dev
    ports:
      - "${BACKEND_GRPC_PORT:-50051}:50051"
      - "${FLOWER_PORT:-5555}:5555"
    volumes:
      - ./futureagi:/app/backend
    environment:
      FAST_STARTUP: "true"

  # agentcc-gateway, serving, and code-executor are separate services we
  # don't modify in local dev, so they are NOT built from source here —
  # they inherit the pulled images from docker-compose.yml
  # (futureagi/<svc>:${VERSION:-latest}). Only backend and frontend build
  # from source. This also avoids pulling serving's private ECR base image.


  worker:
    deploy:
      replicas: 0

  worker-default:
    <<: *dev-worker
    profiles: !reset []
  worker-tasks-s:
    <<: *dev-worker
    profiles: !reset []
  worker-tasks-l:
    <<: *dev-worker
    profiles: !reset []
  worker-tasks-xl:
    <<: *dev-worker
    profiles: !reset []
  worker-trace-ingestion:
    <<: *dev-worker
    profiles: !reset []
  worker-agent-compass:
    <<: *dev-worker
    profiles: !reset []

  postgres:
    ports: !override
      - "${PG_PORT:-5432}:5432"

  clickhouse:
    ports: !override
      - "${CH_HTTP_PORT:-8123}:8123"
      - "${CH_PORT:-9000}:9000"

  redis:
    ports: !override
      - "${REDIS_PORT:-6379}:6379"

  minio:
    ports: !override
      - "${MINIO_API_PORT:-9005}:9000"
      - "${MINIO_CONSOLE_PORT:-9006}:9001"

  temporal:
    ports: !override
      - "${TEMPORAL_PORT:-7233}:7233"

  rabbitmq:
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"


  temporal-ui:
    profiles: !reset []

  temporal-admin-tools:
    profiles: !reset []


  peerdb-catalog:
    profiles: !reset []
  peerdb-temporal:
    profiles: !reset []
  peerdb-minio:
    profiles: !reset []
  peerdb-flow-api:
    profiles: !reset []
  peerdb-flow-worker:
    profiles: !reset []
  peerdb-flow-snapshot-worker:
    profiles: !reset []
  peerdb-server:
    profiles: !reset []
  peerdb-ui:
    profiles: !reset []
  peerdb-temporal-init:
    profiles: !reset []
  peerdb-init:
    profiles: !reset []

  pgbouncer:
    image: edoburu/pgbouncer:1.18.0
    ports:
      - "${PGBOUNCER_PORT:-6432}:6432"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./futureagi/config/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini
      - ./futureagi/config/userlist.txt:/etc/pgbouncer/userlist.txt
    restart: unless-stopped


  docker-proxy:
    image: alpine/socat
    command: -t 900 TCP-LISTEN:2375,fork,reuseaddr UNIX-CONNECT:/var/run/docker.sock
    user: root
    volumes:
      - ${DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock
    restart: unless-stopped
