# Manual trigger only. Run from the Actions tab when ready to cut a backend release.
# Publishes futureagi/future-agi:<version>, :<minor>, :latest as a multi-arch manifest.
# Required secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN.

name: Release backend

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to publish (e.g. v1.22.43)'
        required: true
        type: string
      branch:
        description: 'Branch to build from'
        required: true
        default: 'main'
        type: choice
        options:
          - main
          - dev

permissions:
  contents: read

env:
  IMAGE: futureagi/future-agi
  CONTEXT: ./futureagi
  DOCKERFILE: ./futureagi/Dockerfile.oss

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    environment: production
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          submodules: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.CONTEXT }}
          file: ${{ env.DOCKERFILE }}
          platforms: ${{ matrix.platform }}
          provenance: false
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=backend-${{ matrix.arch }}
          cache-to: type=gha,scope=backend-${{ matrix.arch }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge multi-arch manifest
    needs: build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Resolve version & minor
        id: version
        run: |
          set -eu
          v="${{ inputs.version }}"
          if ! printf '%s' "$v" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$'; then
            echo "::error::Version '$v' does not match expected vX.Y.Z[-suffix] form"
            exit 1
          fi
          base="${v%%-*}"
          minor="${base%.*}"
          { echo "version=$v"; echo "minor=$minor"; } >> "$GITHUB_OUTPUT"
          echo "Resolved: version=$v, minor=$minor"

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create multi-arch manifest
        working-directory: /tmp/digests
        run: |
          set -eu
          docker buildx imagetools create \
            --tag ${{ env.IMAGE }}:${{ steps.version.outputs.version }} \
            --tag ${{ env.IMAGE }}:${{ steps.version.outputs.minor }} \
            --tag ${{ env.IMAGE }}:latest \
            $(printf '${{ env.IMAGE }}@sha256:%s ' *)

      - name: Inspect
        run: |
          docker buildx imagetools inspect ${{ env.IMAGE }}:${{ steps.version.outputs.version }}
