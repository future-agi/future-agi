# Manual trigger only. Run from the Actions tab when ready to cut a release.
# Required secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN.

name: Release images

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to publish (e.g. v1.22.41)'
        required: true
        type: string
      branch:
        description: 'Branch to build from'
        required: true
        default: 'main'
        type: choice
        options:
          - main
          - dev

permissions:
  contents: read

jobs:
  release:
    name: Build & push ${{ matrix.service }}
    runs-on: ubuntu-latest
    environment: production
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            repo: future-agi
            context: ./futureagi
            dockerfile: Dockerfile.oss
          - service: frontend
            repo: frontend
            context: ./frontend
            dockerfile: Dockerfile
          - service: agentcc-gateway
            repo: agentcc-gateway
            context: ./agentcc-gateway
            dockerfile: Dockerfile
          - service: serving
            repo: serving
            context: ./futureagi/model_serving
            dockerfile: Dockerfile.oss
          - service: code-executor
            repo: code-executor
            context: ./futureagi/code-executor
            dockerfile: Dockerfile

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          # Keep ee/ out of the public image build context.
          submodules: false

      - name: Resolve version & minor
        id: version
        run: |
          set -eu
          v="${{ inputs.version }}"
          if ! printf '%s' "$v" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$'; then
            echo "::error::Version '$v' does not match expected vX.Y.Z[-suffix] form"
            exit 1
          fi
          base="${v%%-*}"
          minor="${base%.*}"
          { echo "version=$v"; echo "minor=$minor"; } >> "$GITHUB_OUTPUT"
          echo "Resolved: version=$v, minor=$minor"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: |
            futureagi/${{ matrix.repo }}:${{ steps.version.outputs.version }}
            futureagi/${{ matrix.repo }}:${{ steps.version.outputs.minor }}
            futureagi/${{ matrix.repo }}:latest
          cache-from: type=registry,ref=futureagi/${{ matrix.repo }}:buildcache
          cache-to: type=registry,ref=futureagi/${{ matrix.repo }}:buildcache,mode=max

