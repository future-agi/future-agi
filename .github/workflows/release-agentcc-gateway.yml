# Manual escape hatch for ad-hoc and -dev builds. Stable releases go through
# release-images.yml (tag-triggered); this wrapper shares the same build via
# build-image.yml so the two paths cannot drift.
name: Release agentcc-gateway

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to publish (e.g. v2.1.0-dev)'
        required: true
        type: string
      branch:
        description: 'Branch to build from'
        required: true
        default: 'main'
        type: choice
        options: [main, dev]

permissions:
  contents: read

jobs:
  release:
    uses: ./.github/workflows/build-image.yml
    with:
      image: futureagi/agentcc-gateway
      context: ./agentcc-gateway
      dockerfile: ./agentcc-gateway/Dockerfile
      version: ${{ inputs.version }}
      ref: ${{ inputs.branch }}
      platforms: 'linux/amd64,linux/arm64'
      push-latest: false
      free-disk: false
      cache-scope: agentcc-gateway
    secrets:
      dockerhub-username: ${{ secrets.DOCKERHUB_USERNAME }}
      dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}
