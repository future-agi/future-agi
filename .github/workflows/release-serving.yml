# Manual escape hatch for ad-hoc and -dev builds. Stable releases go through
# release-images.yml (tag-triggered); this wrapper shares the same build via
# build-image.yml so the two paths cannot drift.
#
# NOTE: builds Dockerfile.oss (self-contained public base). The sibling plain
# Dockerfile pulls a private ECR base and is not usable by the OSS pipeline.
name: Release serving

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to publish (e.g. v2.1.0-dev)'
        required: true
        type: string
      branch:
        description: 'Branch to build from'
        required: true
        default: 'main'
        type: choice
        options: [main, dev]

permissions:
  contents: read

jobs:
  release:
    uses: ./.github/workflows/build-image.yml
    with:
      image: futureagi/serving
      context: ./futureagi/model_serving
      dockerfile: ./futureagi/model_serving/Dockerfile.oss
      version: ${{ inputs.version }}
      ref: ${{ inputs.branch }}
      platforms: 'linux/amd64,linux/arm64'
      push-latest: false
      free-disk: false
      cache-scope: serving
    secrets:
      dockerhub-username: ${{ secrets.DOCKERHUB_USERNAME }}
      dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}
