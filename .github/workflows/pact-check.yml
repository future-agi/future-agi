name: Formal Analysis

on:
  pull_request:
    paths:
      - "futureagi/**/*.py"
      - "agentcc-gateway/**/*.go"
      - "tools/pact/**"
      - "docs/tla/**"
      - "docs/adr/**"
      - "**/formal_tests/**"

jobs:
  pact:
    name: pact / static analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pact dependencies
        run: pip install z3-solver hypothesis

      - name: Run pact (incremental — dirty subgraph only)
        id: pact
        run: |
          python -m tools.pact.cli futureagi/ \
            --json --incremental --stats \
            2>/dev/null | tee /tmp/pact_violations.json
          COUNT=$(python3 -c "import json; print(len(json.load(open('/tmp/pact_violations.json'))))")
          echo "violation_count=$COUNT" >> $GITHUB_OUTPUT

      - name: Annotate violations
        if: steps.pact.outputs.violation_count != '0'
        run: |
          python3 - <<'PY'
          import json
          for v in json.load(open('/tmp/pact_violations.json')):
              f = v.get('file','?')
              l = v.get('line', 1)
              mode = v.get('context', 'pact')
              msg = ', '.join(v.get('missing', [v.get('call','?')]))
              print(f'::error file={f},line={l},title={mode}::{msg}')
          PY

      - name: Fail on new violations
        if: steps.pact.outputs.violation_count != '0'
        run: |
          echo "pact: ${{ steps.pact.outputs.violation_count }} new violation(s) introduced by this PR"
          exit 1

  tlc:
    name: tlc / model checking
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find changed TLA+ specs
        id: changed_tla
        run: |
          changed=$(git diff --name-only origin/main...HEAD -- 'docs/tla/*.tla' | tr '\n' ' ')
          echo "specs=$changed" >> $GITHUB_OUTPUT
          if [ -z "$changed" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Download TLC
        if: steps.changed_tla.outputs.skip != 'true'
        run: curl -fsSL --fail -o /tmp/tla2tools.jar https://github.com/tlaplus/tlaplus/releases/latest/download/tla2tools.jar

      - name: Run TLC on changed specs only
        if: steps.changed_tla.outputs.skip != 'true'
        run: |
          set -e
          failed=0
          for spec in ${{ steps.changed_tla.outputs.specs }}; do
            cfg="${spec%.tla}.cfg"
            [ -f "$cfg" ] || { echo "::warning file=$spec::No .cfg found — skipping TLC"; continue; }
            echo "=== TLC: $spec ==="
            if ! java -jar /tmp/tla2tools.jar -config "$cfg" "$spec" -deadlock 2>&1 | tee /tmp/tlc_$(basename ${spec%.tla}).log | grep -q "Model checking completed"; then
              echo "::error file=$spec::TLC found an error — see log"
              failed=1
            fi
          done
          exit $failed

      - name: Skip notice
        if: steps.changed_tla.outputs.skip == 'true'
        run: echo "No TLA+ specs changed — TLC skipped"

  z3-hypothesis:
    name: z3 + hypothesis / formal tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install formal test dependencies
        run: pip install z3-solver hypothesis pytest pytest-django django

      - name: Run Z3 formal tests
        id: z3
        continue-on-error: true
        run: |
          find futureagi tools/pact -path "*/formal_tests/test_*z3*.py" \
            -not -path "*/node_modules/*" \
            | xargs --no-run-if-empty pytest -x -q --tb=short 2>&1 | tee /tmp/z3_results.txt
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Run Hypothesis property tests
        id: hypothesis
        continue-on-error: true
        run: |
          find futureagi tools/pact -path "*/formal_tests/test_*hypothesis*.py" \
            -not -path "*/node_modules/*" \
            | xargs --no-run-if-empty pytest -x -q --tb=short 2>&1 | tee /tmp/hypothesis_results.txt
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Fail if any formal tests failed
        run: |
          z3_exit="${{ steps.z3.outputs.exit_code }}"
          hyp_exit="${{ steps.hypothesis.outputs.exit_code }}"
          if [ "$z3_exit" != "0" ] || [ "$hyp_exit" != "0" ]; then
            echo "::error::Formal tests failed — Z3 exit=$z3_exit  Hypothesis exit=$hyp_exit"
            cat /tmp/z3_results.txt /tmp/hypothesis_results.txt
            exit 1
          fi

  adr:
    name: adr / spec coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Each TLA+ spec must reference an ADR
        run: |
          set -e
          missing=0
          for tla in docs/tla/*.tla; do
            name=$(basename "$tla")
            if ! grep -q "Architecture decision:" "$tla"; then
              echo "::error file=$tla::$name has no 'Architecture decision:' ADR back-reference"
              missing=1
            fi
          done
          exit $missing

      - name: Each referenced ADR must exist
        run: |
          set -e
          missing=0
          for tla in docs/tla/*.tla; do
            adr=$(grep -oP 'Architecture decision: \Kdocs/adr/[^\s]+' "$tla" || true)
            if [ -n "$adr" ] && [ ! -f "$adr" ]; then
              echo "::error file=$tla::References '$adr' but that file does not exist"
              missing=1
            fi
          done
          exit $missing
